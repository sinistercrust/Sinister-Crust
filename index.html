<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SINISTER CRUST | TERMINAL</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(180deg, #1a0000 0%, #050000 100%);
            color: #ffffff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        header { text-align: center; margin-bottom: 20px; z-index: 1; }
        h1 { color: #fff; text-shadow: 0 0 10px #ffcc00; margin: 10px 0; letter-spacing: 2px; }

        #decrypt-meter { color: #ffcc00; font-weight: bold; margin-bottom: 20px; }

        .links { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; }
        .links a { color: #ffcc00; text-decoration: none; font-size: 0.8em; border: 1px solid #ffcc00; padding: 5px 10px; }

        .container { width: 90%; max-width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; z-index: 1; }

        .sector { background: #000000; border: 1px solid #ffcc00; padding: 20px; transition: all 0.3s ease; cursor: pointer; white-space: pre-wrap; }
        .sector:hover { box-shadow: 0 0 20px #ffcc00; transform: scale(1.02); }

        h2 { border-bottom: 1px solid #ffcc00; padding-bottom: 5px; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="links">
        <a href="#">YOUTUBE</a>
        <a href="#">REDDIT</a>
        <a href="#">ROYAL ROAD</a>
    </div>

    <header>
        <h1>SINISTER CRUST</h1>
        <div id="decrypt-meter">[DECRYPTING: 0%]</div>
    </header>

    <div class="container">
        <div class="sector" id="s1">
            <h2>SECTOR 01: SCI-FI HORROR</h2>
            <p>Story data stream placeholder...</p>
        </div>
        <div class="sector" id="s2">
            <h2>SECTOR 02: MODERN HORROR</h2>
            <p>Story data stream placeholder...</p>
        </div>
    </div>

    <script>
        let progress = 0;
        const meter = document.getElementById('decrypt-meter');
        
        function updateMeter() {
            if (progress < 100) {
                progress += Math.floor(Math.random() * 5);
                if (progress > 100) progress = 100;
                meter.innerText = `[DECRYPTING: ${progress}%]`;
            } else {
                meter.innerText = "[SYSTEM READY]";
            }
        }
        setInterval(updateMeter, 800);
    </script>
</body>
</html>
