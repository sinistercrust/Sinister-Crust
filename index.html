<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINISTER CRUST // SYSTEM HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500&family=Open+Sans:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0000;
            --bg-gradient: radial-gradient(circle at 50% 50%, #1a0000 0%, #0a0000 100%);
            --border-red: #4a0000;
            --accent-yellow: #ffcc00;
            --panel-bg: rgba(5, 5, 5, 0.9);
            --text-main: #f0f0f0;
        }

        body {
            margin: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
        }

        /* CRT Energy Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            opacity: 0.05;
            pointer-events: none;
        }

        header { padding: 40px 20px; text-align: center; }
        h1 { font-family: 'Oswald', sans-serif; letter-spacing: 4px; color: var(--accent-yellow); }

        .nav-dock { 
            display: flex; justify-content: center; gap: 30px; margin: 20px 0; padding: 20px;
            border: 1px solid var(--border-red); background: var(--panel-bg);
            transition: box-shadow 0.3s;
        }

        .nav-dock.glow { box-shadow: 0 0 20px var(--accent-yellow); border-color: var(--accent-yellow); }

        .icon { width: 32px; height: 32px; filter: grayscale(100%); transition: 0.3s; cursor: pointer; }
        .icon:hover { filter: grayscale(0%); transform: scale(1.1); }

        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        .sector {
            background: var(--panel-bg);
            border: 1px solid var(--border-red);
            padding: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .sector.glow { 
            box-shadow: 0 0 30px var(--accent-yellow); 
            border-color: var(--accent-yellow);
        }

        h2 { font-family: 'Oswald', sans-serif; color: var(--accent-yellow); margin-top: 0; }

        .story-area {
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 1rem;
            color: var(--text-main);
            margin-top: 20px;
        }

        footer { text-align: center; padding: 50px; color: #333; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <h1>SINISTER CRUST</h1>
    <nav class="nav-dock" id="nav-bar">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" class="icon" alt="YouTube">
        <img src="https://upload.wikimedia.org/wikipedia/en/b/bd/Reddit_Logo_Icon.svg" class="icon" alt="Reddit">
        <img src="https://www.royalroad.com/dist/img/favicon/apple-touch-icon.png" class="icon" alt="Royal Road">
    </nav>
</header>

<main class="container">
    <section class="sector" onclick="triggerGlow(this)">
        <h2>[SECTOR 01: SCI-FI HORROR]</h2>
        <div class="story-area">Paste your science fiction horrors here...</div>
    </section>

    <section class="sector" onclick="triggerGlow(this)">
        <h2>[SECTOR 02: MODERN HORROR]</h2>
        <div class="story-area">Paste your modern nightmares here...</div>
    </section>
</main>

<footer>
    &copy; SINISTER CRUST. ALL CONTENT PROTECTED. UNAUTHORIZED REPRODUCTION IS STRICTLY PROHIBITED.
</footer>

<script>
    function triggerGlow(element) {
        element.classList.add('glow');
        setTimeout(() => {
            element.classList.remove('glow');
        }, 1000); // Pulse for 1 second
    }

    document.getElementById('nav-bar').addEventListener('click', function() {
        this.classList.add('glow');
        setTimeout(() => this.classList.remove('glow'), 1000);
    });
</script>
</body>
</html>
